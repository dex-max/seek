<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Seek</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-zinc-950">
    <header class="border-b-2 border-zinc-900 text-white">
        <nav class="flex justify-center items-center px-8 py-4">
            <form x-data="downloadBar" @submit.prevent="download"
                class="flex rounded-full border-2 border-zinc-900 px-4 py-3 w-[min(800px,100%)]">
                <input type="url" x-model="url" placeholder="Download Video" class="grow" />
                <button>
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                </button>
            </form>
        </nav>
    </header>
    <main>
        <div x-data="videoList" class="grid grid-cols-[repeat(auto-fill,minmax(300px,1fr))] gap-6 px-8 py-4">
            <template x-for="video in videos">
                <div x-data="videoCard" class="bg-zinc-900 text-white rounded-xl overflow-hidden">
                    <button @click="playVideo(video)">
                        <div class="relative">
                            <img :src="`/thumbnail/${encodeURIComponent(video.title)}`">
                            <span x-text="video.duration"
                                class="absolute rounded-md bottom-2 right-2 bg-black/50 px-1 py-0.5 text-sm tracking-tight">
                            </span>
                        </div>
                        <div>
                            <div x-text="video.title" class="px-5 py-3"></div>
                        </div>
                    </button>
                </div>
            </template>
        </div>
    </main>
</body>

</html>
